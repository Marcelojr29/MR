<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Nossa Casa</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#7c4dff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#141018" />
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&amp;family=JetBrains+Mono:wght@400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="manifest" href="manifest.webmanifest" />
    <script>
      (function () {
        var stored = localStorage.getItem('nossa-casa-theme');
        var scheme = stored === 'light' || stored === 'dark' ? stored : 'light dark';
        document.documentElement.style.colorScheme = scheme;
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
    <noscript>Please enable JavaScript to continue using this application.</noscript>
  </body>
</html>
