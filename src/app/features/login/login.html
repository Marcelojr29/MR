<div class="login-bg min-h-dvh flex items-center justify-center p-4">
  <form
    class="login-card w-full max-w-sm flex flex-col gap-3 rounded-2xl border border-[var(--mat-sys-outline-variant)] p-6"
    (ngSubmit)="submit()"
    [formGroup]="form"
  >
    <div class="flex items-center gap-3 mb-2">
      <app-logo-mark [size]="40" />
      <h1 class="login-title text-2xl font-semibold tracking-tight">Nossa Casa</h1>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>E-mail</mat-label>
      <input matInput type="email" formControlName="email" autocomplete="username" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Senha</mat-label>
      <input matInput type="password" formControlName="password" autocomplete="current-password" />
    </mat-form-field>

    @if (errorMessage()) {
      <p class="text-sm text-[var(--mat-sys-error)]">{{ errorMessage() }}</p>
    }

    <button
      mat-flat-button
      color="primary"
      type="submit"
      class="!mt-2"
      [disabled]="form.invalid || loading()"
    >
      @if (loading()) {
        <mat-spinner diameter="20" class="inline-block align-middle" />
      } @else {
        Entrar
      }
    </button>
  </form>
</div>
