<div class="max-w-3xl mx-auto p-4">
  <h1 class="text-xl font-medium mb-4">Painel</h1>
  <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
    @for (kpi of kpis(); track kpi.label) {
      <mat-card class="accent-card !p-4 flex flex-col gap-3" [style.--accent]="kpi.color">
        <span class="icon-badge">
          <mat-icon>{{ kpi.icon }}</mat-icon>
        </span>
        <span class="mono-value text-lg font-semibold">{{ kpi.value }}</span>
        <span class="text-xs text-[var(--mat-sys-on-surface-variant)]">{{ kpi.label }}</span>
      </mat-card>
    }
  </div>
</div>
