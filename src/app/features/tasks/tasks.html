<div class="max-w-xl mx-auto p-4 flex flex-col gap-4">
  <div class="page-header">
    <span class="icon-badge" style="--accent: #7c4dff">
      <mat-icon>checklist</mat-icon>
    </span>
    <h1 class="text-xl font-semibold tracking-tight">Afazeres</h1>
  </div>

  <form
    class="flex gap-2 items-start rounded-2xl border border-[var(--mat-sys-outline-variant)] p-3"
    (ngSubmit)="addTask()"
  >
    <mat-form-field appearance="outline" class="flex-1">
      <mat-label>Nova tarefa</mat-label>
      <input matInput [(ngModel)]="newTitle" name="newTitle" />
    </mat-form-field>
    <button mat-icon-button color="primary" type="submit" aria-label="Adicionar tarefa">
      <mat-icon>add_circle</mat-icon>
    </button>
  </form>

  @if (tasksService.tasks().length === 0) {
    <div class="empty-state">
      <mat-icon>checklist</mat-icon>
      <p class="text-sm">Nenhuma tarefa por aqui. Adicione a primeira acima. 🎉</p>
    </div>
  }

  <ul class="flex flex-col gap-2">
    @for (task of tasksService.tasks(); track task.id) {
      <li class="row-card flex items-center gap-2 pl-3 pr-1" style="--accent: #7c4dff">
        <mat-checkbox [checked]="task.done" (change)="tasksService.toggle(task)" />
        <span
          class="flex-1 py-2 cursor-pointer"
          [class.line-through]="task.done"
          [class.opacity-60]="task.done"
          (click)="editTask(task)"
        >
          {{ task.title }}
        </span>
        <button mat-icon-button (click)="removeTask(task)" aria-label="Remover tarefa">
          <mat-icon>delete_outline</mat-icon>
        </button>
      </li>
    }
  </ul>
</div>
