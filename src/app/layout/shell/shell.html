<mat-toolbar class="app-toolbar !fixed top-0 inset-x-0 z-20">
  <app-logo-mark [size]="32" />
  <span class="ml-2 text-lg font-medium tracking-tight">Nossa Casa</span>
  <span class="flex-1"></span>
  <button mat-icon-button (click)="theme.toggle()" aria-label="Alternar tema">
    <mat-icon>{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
  <button mat-icon-button routerLink="/priorities" aria-label="Prioridades">
    <mat-icon>flag</mat-icon>
  </button>
  <button mat-icon-button (click)="logout()" aria-label="Sair">
    <mat-icon>logout</mat-icon>
  </button>
</mat-toolbar>

<main class="pt-16 pb-24 min-h-dvh">
  <router-outlet />
</main>

<nav class="app-bottom-nav fixed bottom-0 inset-x-0 z-20 flex justify-around">
  @for (item of navItems; track item.path) {
    <a [routerLink]="item.path" routerLinkActive="is-active" class="app-nav-item">
      <span class="app-nav-pill">
        <mat-icon>{{ item.icon }}</mat-icon>
      </span>
      <span class="text-[0.6875rem]">{{ item.label }}</span>
    </a>
  }
</nav>
